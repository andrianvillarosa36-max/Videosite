<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — VideoSite</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-page">

  <div class="auth-box">
    <h1 class="logo">▶ VideoSite</h1>
    <p class="auth-sub">Create your account</p>

    <div id="errorMsg" class="error-msg" style="display:none;"></div>
    <div id="successMsg" class="success-msg" style="display:none;">✓ Account created! Redirecting...</div>

    <div class="field">
      <input type="text" id="username" placeholder="Choose a username" />
    </div>
    <div class="field" style="position:relative;">
      <input type="password" id="password" placeholder="Choose a password" style="padding-right:44px;" />
      <span onclick="togglePassword('password', this)" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:1.1rem;">👁️</span>
    </div>
    <div class="field" style="position:relative;">
      <input type="password" id="confirmPassword" placeholder="Confirm password" style="padding-right:44px;" />
      <span onclick="togglePassword('confirmPassword', this)" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:1.1rem;">👁️</span>
    </div>

    <button onclick="signup()">Create Account</button>

    <p style="text-align:center; margin-top:16px; font-size:0.82rem; color:#8B949E;">
      Already have an account? <a href="/login.html" style="color:#00D4FF; text-decoration:none;">Sign in</a>
    </p>
  </div>

  <script>
    function togglePassword(id, el) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type    = 'text';
        el.textContent = '🙈';
      } else {
        input.type    = 'password';
        el.textContent = '👁️';
      }
    }

    async function signup() {
      const username        = document.getElementById('username').value.trim();
      const password        = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const errorMsg        = document.getElementById('errorMsg');
      const successMsg      = document.getElementById('successMsg');

      errorMsg.style.display   = 'none';
      successMsg.style.display = 'none';

      if (!username || !password || !confirmPassword) {
        errorMsg.textContent   = 'Please fill in all fields.';
        errorMsg.style.display = 'block';
        return;
      }

      if (username.length < 3) {
        errorMsg.textContent   = 'Username must be at least 3 characters.';
        errorMsg.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent   = 'Password must be at least 6 characters.';
        errorMsg.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        errorMsg.textContent   = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      const res  = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        successMsg.style.display = 'block';
        setTimeout(function() {
          window.location.href = '/login.html';
        }, 1500);
      } else {
        errorMsg.textContent   = data.message;
        errorMsg.style.display = 'block';
      }
    }
  </script>

</body>
</html>
